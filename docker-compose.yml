version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: restaurantos-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: restaurantOS

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurantos-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/restaurantOS
      JWT_SECRET: local_dev_secret_change_in_production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      # Add your Cloudinary & Stripe keys here or via .env
    depends_on:
      - mongo
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurantos-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
